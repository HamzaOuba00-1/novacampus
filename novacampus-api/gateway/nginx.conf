# ============================================================
# gateway/nginx.conf
# Reverse proxy NGINX – ERP Novacampus Alliance – VERSION FINALE
#
# Rôle :
#   – Point d'entrée unique (port 8080)
#   – Validation JWT déléguée à l'auth-service via auth_request
#   – Routage vers auth-service (3001), academic-service (3002),
#     planning-service (3003), inscription-service (3004),
#     payment-service (3005), notification-service (3006),
#     campus-service (3007) et reporting-service (3008)
#   – Distinction routes publiques / routes protégées
#   – Gestion de l'upgrade WebSocket pour le notification-service
#
# Note : les routes /api/schedules du planning sont préfixées
# /api/planning/ pour éviter le conflit avec l'academic-service.
#
# Note : les routes /api/students/:id/enrollments (academic-service)
# sont préfixées /api/academic/students/ pour éviter le conflit
# avec /api/students/ (inscription-service).
# ============================================================
events {
  worker_connections 1024;
}
http {
  # ----------------------------------------------------------
  # Macro CORS – autorise le frontend Next.js (localhost:3000)
  # à appeler le gateway depuis le navigateur.
  # Les headers sont injectés sur TOUTES les réponses (always)
  # y compris les erreurs 4xx/5xx renvoyées par auth_request.
  # ----------------------------------------------------------
  map $http_origin $cors_origin {
    "http://localhost:3000" "http://localhost:3000";
    default                 "";
  }
  # ----------------------------------------------------------
  # Mappage pour la gestion de l'upgrade WebSocket
  # Utilisé par le notification-service (ws://localhost:8080/api/ws)
  # ----------------------------------------------------------
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }
  server {
    listen 80;
    server_name localhost;
    # ----------------------------------------------------------
    # Headers CORS globaux
    # Appliqués sur chaque réponse avant d'atteindre le client.
    # ----------------------------------------------------------
    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept" always;
    add_header Access-Control-Allow-Credentials "true" always;
    # ----------------------------------------------------------
    # NOUVEAU – Désactive le cache HTTP sur toutes les réponses API.
    # Sans ça, le navigateur peut renvoyer un 304 Not Modified avec
    # un body VIDE sur une requête cross-origin (front:3000 ↔
    # gateway:8080), ce qui fait croire à l'app que les données
    # sont absentes (ex: enrollments → [] alors que l'API a des
    # données). Le problème a été observé sur
    # /api/academic/students/me/enrollments.
    # ----------------------------------------------------------
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    # ----------------------------------------------------------
    # Preflight OPTIONS – répondu directement par NGINX
    # Le navigateur envoie une requête OPTIONS avant chaque
    # appel cross-origin ; on répond 204 sans toucher aux services.
    # ----------------------------------------------------------
    location / {
      if ($request_method = OPTIONS) {
        return 204;
      }
      return 404;
    }
    # ----------------------------------------------------------
    # Route interne de validation JWT
    # Accessible UNIQUEMENT depuis NGINX (directive internal)
    # Appelée automatiquement avant chaque route protégée
    # Retourne 200 si le token est valide, 401 sinon
    # ----------------------------------------------------------
    location /authenticate {
      internal;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Authorization $http_authorization;
      proxy_set_header X-Original-URI $request_uri;
      proxy_pass http://auth-service:3001/api/auth/validate;
    }
    # ==========================================================
    # AUTH-SERVICE – routes publiques (sans token)
    # ==========================================================
    location /api/auth/register {
      if ($request_method = OPTIONS) { return 204; }
      proxy_pass http://auth-service:3001/api/auth/register;
    }
    location /api/auth/login {
      if ($request_method = OPTIONS) { return 204; }
      proxy_pass http://auth-service:3001/api/auth/login;
    }
    location /api/auth/refresh {
      if ($request_method = OPTIONS) { return 204; }
      proxy_pass http://auth-service:3001/api/auth/refresh;
    }
    # ==========================================================
    # AUTH-SERVICE – routes protégées (token requis)
    # ==========================================================
    location /api/auth/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      auth_request_set $auth_user $upstream_http_x_auth_user;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://auth-service:3001;
    }
    location /api/users/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://auth-service:3001;
    }
    # ==========================================================
    # ACADEMIC-SERVICE – routes protégées (token requis)
    # Toutes les routes académiques nécessitent un JWT valide.
    # La vérification des rôles (instructor, admin…) est faite
    # côté academic-service dans ses propres middlewares.
    # ==========================================================
    location /api/programs {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    location /api/programs/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    location /api/courses {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    location /api/courses/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    location /api/enrollments {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    location /api/enrollments/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    location /api/grades/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    location /api/absences/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    location /api/deadlines/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    location /api/resources/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    # ----------------------------------------------------------
    # NOUVEAU – enrollments étudiant (academic-service)
    # GET /api/students/:id/enrollments est défini dans
    # l'academic-service, mais /api/students/ pointe vers
    # l'inscription-service. On le préfixe par /api/academic/
    # pour éviter le conflit. Le préfixe /api/academic est retiré
    # via proxy_pass avec URI explicite vers /api/students/.
    # Exemple : /api/academic/students/me/enrollments
    #        → http://academic-service:3002/api/students/me/enrollments
    # ----------------------------------------------------------
    location /api/academic/students/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002/api/students/;
    }
    # Fichiers uploadés servis directement par le service académique
    location /uploads/academic/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://academic-service:3002;
    }
    # ==========================================================
    # PLANNING-SERVICE – routes protégées (token requis)
    #
    # Les routes /api/schedules sont préfixées /api/planning/
    # pour éviter tout conflit avec l'academic-service.
    # Le préfixe est retiré avant transmission au planning-service
    # grâce au rewrite implicite du proxy_pass avec URI.
    # ==========================================================
    location /api/rooms {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://planning-service:3003;
    }
    location /api/rooms/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://planning-service:3003;
    }
    # Séances planifiées – préfixe /api/planning/ pour éviter
    # le conflit avec les schedules de l'academic-service
    location /api/planning/schedules {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://planning-service:3003/api/schedules;
    }
    location /api/planning/schedules/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://planning-service:3003/api/schedules/;
    }
    location /api/conflicts {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://planning-service:3003;
    }
    location /api/conflicts/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://planning-service:3003;
    }
    # ==========================================================
    # INSCRIPTION-SERVICE – routes protégées (token requis)
    # Gestion des dossiers étudiants, professeurs et documents.
    # La vérification des rôles est faite côté inscription-service.
    # ==========================================================
    location /api/students {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://inscription-service:3004;
    }
    location /api/students/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://inscription-service:3004;
    }
    location /api/instructors {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://inscription-service:3004;
    }
    location /api/instructors/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://inscription-service:3004;
    }
    location /api/documents/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://inscription-service:3004;
    }
    # Fichiers uploadés (documents justificatifs, pièces d'identité…)
    location /uploads/inscription/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://inscription-service:3004;
    }
    # ==========================================================
    # PAYMENT-SERVICE – routes protégées (token requis)
    # Gestion des factures, paiements et relances.
    # La vérification des rôles est faite côté payment-service.
    # ==========================================================
    location /api/invoices {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://payment-service:3005;
    }
    location /api/invoices/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://payment-service:3005;
    }
    location /api/payments/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://payment-service:3005;
    }
    # ==========================================================
    # NOTIFICATION-SERVICE – routes HTTP REST (token requis)
    # Gestion des notifications push, email et SMS.
    # ==========================================================
    location /api/notifications {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://notification-service:3006;
    }
    location /api/notifications/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://notification-service:3006;
    }
    # ==========================================================
    # NOTIFICATION-SERVICE – WebSocket temps réel
    # Le token JWT est passé en query param : ?token=<JWT>
    # NGINX gère l'upgrade HTTP → WebSocket via les headers
    # Upgrade et Connection. Pas de auth_request ici car le
    # notification-service valide lui-même le token JWT du WS.
    # Timeout long pour maintenir les connexions WS ouvertes.
    # ==========================================================
    location /api/ws {
      proxy_pass http://notification-service:3006/api/ws;
      # Headers obligatoires pour l'upgrade WebSocket
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # Timeout long pour maintenir les connexions WS ouvertes
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
    # ==========================================================
    # CAMPUS-SERVICE – routes protégées (token requis)
    # Gestion des campus, années académiques, audit et config.
    # Réservé aux rôles admin et direction.
    # ==========================================================
    location /api/campuses {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://campus-service:3007;
    }
    location /api/campuses/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://campus-service:3007;
    }
    location /api/academic-years {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://campus-service:3007;
    }
    location /api/academic-years/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://campus-service:3007;
    }
    location /api/audit-logs {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://campus-service:3007;
    }
    location /api/audit-logs/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://campus-service:3007;
    }
    location /api/audit/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://campus-service:3007;
    }
    location /api/config {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://campus-service:3007;
    }
    location /api/config/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://campus-service:3007;
    }
    # ==========================================================
    # REPORTING-SERVICE – routes protégées (token requis)
    # KPIs consolidés, dashboards direction et alertes IA.
    # Réservé aux rôles admin et direction.
    # Les exports (PDF, CSV) sont servis depuis /exports/
    # ==========================================================
    location /api/kpis {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://reporting-service:3008;
    }
    location /api/kpis/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://reporting-service:3008;
    }
    location /api/reports {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://reporting-service:3008;
    }
    location /api/reports/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://reporting-service:3008;
    }
    location /api/ai/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://reporting-service:3008;
    }
    # Fichiers exportés (PDF, CSV, Excel…) générés par le reporting
    location /exports/ {
      if ($request_method = OPTIONS) { return 204; }
      auth_request /authenticate;
      proxy_set_header Authorization $http_authorization;
      proxy_pass http://reporting-service:3008;
    }
    # ==========================================================
    # SANTÉ – routes sans authentification
    # Utilisées par Docker healthcheck et les outils de monitoring
    # ==========================================================
    location /health {
      add_header Content-Type application/json;
      return 200 '{"status":"UP","service":"gateway","version":"1.0.0","services":8}';
    }
    location /api/auth/health {
      proxy_pass http://auth-service:3001/api/health;
    }
    location /api/academic/health {
      proxy_pass http://academic-service:3002/api/health;
    }
    location = /api/planning/health {
      proxy_pass http://planning-service:3003/api/health;
    }
    location = /api/inscription/health {
      proxy_pass http://inscription-service:3004/api/health;
    }
    location = /api/payment/health {
      proxy_pass http://payment-service:3005/api/health;
    }
    location = /api/notification/health {
      proxy_pass http://notification-service:3006/api/health;
    }
    location = /api/campus/health {
      proxy_pass http://campus-service:3007/api/health;
    }
    location = /api/reporting/health {
      proxy_pass http://reporting-service:3008/api/health;
    }
  }
}